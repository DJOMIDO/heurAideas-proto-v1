# docker-compose.yml

services:
  # ========== PostgreSQL Database ==========
  db:
    image: postgres:15-alpine
    container_name: aideas-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aideas_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aideas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== pgAdmin 4 (Optional) ==========
  pgadmin:
    image: dpage/pgadmin4
    container_name: aideas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ========== FastAPI Backend ==========
  backend:
    build: ./backend
    container_name: heuraideas-backend
    ports:
      - "8080:8000" 
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
      - ./frontend/dist:/app/static:ro 
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aideas_db
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
      HOST: 0.0.0.0
      PORT: 8000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_NAME: aideas_db
      CORS_ORIGINS: "https://heuraideas.netlify.app,https://heuraideas-proto-v1.onrender.com"
    depends_on:
      db:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1

volumes:
  postgres_data: {}
  pgadmin_data: {}