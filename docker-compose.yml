# docker-compose.yml

services:
  # ========== PostgreSQL Database ==========
  db:
    image: postgres:15-alpine
    container_name: aideas-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: aideas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aideas_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ========== pgAdmin 4 (Optional) ==========
  pgadmin:
    image: dpage/pgadmin4
    container_name: aideas-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ========== FastAPI Backend ==========
  backend:
    build: ./backend
    container_name: heuraideas-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aideas_db
      SECRET_KEY: your-super-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 720
      HOST: 0.0.0.0
      PORT: 8000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: user
      DB_NAME: aideas_db
    depends_on:
      db:
        condition: service_healthy

  # ========== React Frontend (Nginx) ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: heuraideas-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data: {}
  pgadmin_data: {}